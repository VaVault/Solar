<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>3D Solar System — Learn & Explore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark">
  <style>
    :root{ --bg:#0b0f14; --panel:#0f1620; --panel-2:#141c28; --text:#dfe7f5; --muted:#9ab; }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Noto Sans",Arial}
    #app{position:fixed;inset:0;overflow:hidden}
    #toolbar{
      position:fixed;left:12px;right:12px;top:12px;display:flex;gap:10px;align-items:center;
      background:linear-gradient(180deg,rgba(15,22,32,.9),rgba(15,22,32,.85));backdrop-filter:blur(6px);
      border:1px solid #1c2838;border-radius:10px;padding:10px 12px;z-index:10
    }
    #toolbar label{font-size:13px;color:var(--muted)} #toolbar input[type="range"]{width:180px}
    #toolbar .btn{background:var(--panel-2);border:1px solid #1f2b3c;color:var(--text);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px}
    #toolbar .btn.active{box-shadow:0 0 0 2px #2a3b54 inset}
    #legend{margin-left:auto;display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted)}
    .dot{width:8px;height:8px;border-radius:50%}.sun{background:#ffcc66}.orbit{background:#6aa2ff}.planet{background:#9be}
    #info{position:fixed;right:12px;top:68px;bottom:12px;width:320px;max-width:92vw;background:linear-gradient(180deg,rgba(20,28,40,.95),rgba(20,28,40,.9));border:1px solid #1c2838;border-radius:12px;padding:14px;overflow:auto;z-index:9}
    #info h2{margin:0 0 6px 0;font-size:18px} #info h3{margin:14px 0 6px 0;font-size:14px;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
    #info p{margin:0 0 10px 0;font-size:14px;line-height:1.45} .pill{display:inline-block;padding:4px 8px;border:1px solid #22324a;border-radius:999px;margin:2px;font-size:12px;color:#cfe2ff;background:#0f1622}
    #footerNote{position:fixed;left:12px;bottom:12px;font-size:12px;color:var(--muted);background:rgba(20,28,40,.75);padding:6px 8px;border:1px solid #1c2838;border-radius:8px;z-index:8}
    .label{color:#cfe2ff;background:rgba(15,22,32,.75);border:1px solid #1f2b3c;border-radius:6px;padding:2px 6px;font-size:12px;backdrop-filter:blur(4px);white-space:nowrap;pointer-events:none}
    @media (max-width: 800px){ #toolbar{flex-wrap:wrap;gap:8px} #info{top:auto;height:45%;right:12px;left:12px;width:auto} }
    a{color:#66b3ff}
  </style>
</head>
<body>
  <div id="app" aria-label="Interactive 3D Solar System"></div>

  <div id="toolbar" role="toolbar" aria-label="Controls">
    <button id="pauseBtn" class="btn" aria-pressed="false">⏸️ Pause</button>
    <button id="resetCam" class="btn">🎯 Reset camera</button>
    <button id="toggleOrbits" class="btn active" aria-pressed="true">🟢 Show Orbits</button>

    <label for="speed">Time speed</label>
    <input id="speed" type="range" min="0" max="6" step="0.01" value="2" />
    <span id="speedVal" aria-live="polite">×10</span>

    <label for="follow">Follow</label>
    <select id="follow">
      <option value="">Free camera</option>
      <option>Mercury</option><option>Venus</option><option>Earth</option><option>Mars</option>
      <option>Jupiter</option><option>Saturn</option><option>Uranus</option><option>Neptune</option>
    </select>

    <div id="legend">
      <span class="dot sun"></span>Sun
      <span class="dot orbit"></span>Orbit
      <span class="dot planet"></span>Planet
    </div>
  </div>

  <aside id="info" aria-live="polite">
    <h2>Welcome 👋</h2>
    <p>Drag to orbit, scroll/pinch to zoom, right-drag to pan. Click a planet to learn more.</p>
    <h3>Try these</h3>
    <p class="pill">Click a planet</p><p class="pill">Change time speed</p><p class="pill">Follow a planet</p><p class="pill">Toggle orbits</p>
    <h3>Selected</h3>
    <div id="selected">None. Click a planet to see details.</div>
  </aside>

  <div id="footerNote">Built with <a href="https://threejs.org/" target="_blank" rel="noopener">Three.js</a>. Dark-mode only.</div>

  <!-- Three.js + helpers (ESM) -->
  <script type="module">
    // If one CDN is blocked on your network, switch to the other by toggling the comments.
    const threeBase = 'https://cdn.jsdelivr.net/npm/three@0.160.1';
    // const threeBase = 'https://unpkg.com/three@0.160.1';

    const [{default: THREE}, { OrbitControls }, { CSS2DRenderer, CSS2DObject }, { isWebGLAvailable }] =
      await Promise.all([
        import(threeBase + '/build/three.module.js'),
        import(threeBase + '/examples/jsm/controls/OrbitControls.js'),
        import(threeBase + '/examples/jsm/renderers/CSS2DRenderer.js'),
        import(threeBase + '/examples/jsm/capabilities/WebGL.js'),
      ]);

    // WebGL availability check (works for WebGL1 or WebGL2)
    if (!isWebGLAvailable()) {
      document.getElementById('info').innerHTML = '<h2>WebGL not available</h2><p>Your browser/device disabled WebGL. Try Chrome/Edge/Firefox and enable hardware acceleration.</p>';
      throw new Error('WebGL not available');
    }

    const container = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f14);

    // Renderer (works in WebGL1 or WebGL2)
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // 2D labels
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(container.clientWidth, container.clientHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    const camera = new THREE.PerspectiveCamera(55, container.clientWidth/container.clientHeight, 0.1, 6000);
    camera.position.set(0, 120, 360);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 40;
    controls.maxDistance = 2000;

    // Lights: make things visible even on low-end GPUs
    const hemi = new THREE.HemisphereLight(0x9dbfff, 0x1a2230, 0.6);
    scene.add(hemi);
    const sunLight = new THREE.PointLight(0xffddaa, 2.0, 0, 2);
    scene.add(sunLight);

    // Stars
    (function makeStars(){
      const starGeo = new THREE.BufferGeometry();
      const starCount = 2500;
      const positions = new Float32Array(starCount*3);
      for (let i=0;i<starCount;i++){
        const r = 1400 + Math.random()*600;
        const t = Math.acos(2*Math.random()-1);
        const p = Math.random()*Math.PI*2;
        positions[i*3+0] = r*Math.sin(t)*Math.cos(p);
        positions[i*3+1] = r*Math.cos(t);
        positions[i*3+2] = r*Math.sin(t)*Math.sin(p);
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
      const starMat = new THREE.PointsMaterial({ size: 1.2, transparent:true, opacity:0.85 });
      scene.add(new THREE.Points(starGeo, starMat));
    })();

    // Sun
    const sun = new THREE.Mesh(
      new THREE.SphereGeometry(16, 48, 32),
      new THREE.MeshBasicMaterial({ color: 0xffcc66 }) // self-emissive
    );
    scene.add(sun);
    sunLight.position.copy(sun.position);

    // Planet data
    const PLANETS = [
      { name:'Mercury', color:0xb1b1b1, radius:1.6, orbit: 28,  period: 88,    tilt: 0.01, info:{type:'Terrestrial', fact:'Smallest planet; ~88-day year.', moons:0 } },
      { name:'Venus',   color:0xe0c283, radius:3.9, orbit: 52,  period: 225,   tilt: 177.4, info:{type:'Terrestrial', fact:'Runaway greenhouse makes it hottest.', moons:0 } },
      { name:'Earth',   color:0x4da6ff, radius:4.1, orbit: 72,  period: 365,   tilt: 23.4, info:{type:'Terrestrial', fact:'Only known world with life.', moons:1 } },
      { name:'Mars',    color:0xc7614b, radius:2.2, orbit: 110, period: 687,   tilt: 25.2, info:{type:'Terrestrial', fact:'Home to Olympus Mons.', moons:2 } },
      { name:'Jupiter', color:0xd7c7a3, radius:9.0, orbit: 370, period: 4333,  tilt: 3.1, info:{type:'Gas Giant', fact:'Largest planet; Great Red Spot.', moons:'~95 known' } },
      { name:'Saturn',  color:0xe8d6a8, radius:7.6, orbit: 680, period: 10759, tilt: 26.7, info:{type:'Gas Giant', fact:'Spectacular icy rings.', moons:'~83 confirmed' } },
      { name:'Uranus',  color:0x9ed9e8, radius:6.3, orbit: 1020,period: 30687, tilt: 97.8, info:{type:'Ice Giant', fact:'Rotates on its side.', moons:27 } },
      { name:'Neptune', color:0x4e80ff, radius:6.1, orbit: 1600,period: 60190, tilt: 28.3, info:{type:'Ice Giant', fact:'Fastest winds.', moons:14 } },
    ];

    const world = new THREE.Group(); scene.add(world);
    const orbitLines = new THREE.Group(); world.add(orbitLines);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clickable = [];
    const planetMap = new Map();

    function makeOrbit(radius, color=0x3b5a9e){
      const seg = 256, pts = [];
      for(let i=0;i<=seg;i++){
        const a = i/seg * Math.PI*2;
        pts.push(new THREE.Vector3(Math.cos(a)*radius, 0, Math.sin(a)*radius));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.5 });
      return new THREE.Line(geo, mat);
    }

    function addLabel(obj, text){
      const div = document.createElement('div'); div.className = 'label'; div.textContent = text;
      const label = new CSS2DObject(div);
      label.position.set(0, obj.userData.radius * 1.25 + 1.5, 0);
      obj.add(label); return label;
    }

    // Create planets (Phong = very compatible)
    for(const p of PLANETS){
      const pivot = new THREE.Object3D(); world.add(pivot);
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(p.radius, 48, 32),
        new THREE.MeshPhongMaterial({ color: p.color, shininess: 8 })
      );
      mesh.position.set(p.orbit, 0, 0);
      mesh.userData = { name:p.name, radius:p.radius, tilt:p.tilt, orbit:p.orbit, period:p.period, info:p.info, pivot, label:null };
      mesh.rotation.z = THREE.MathUtils.degToRad(p.tilt);
      pivot.add(mesh);

      orbitLines.add(makeOrbit(p.orbit));
      mesh.userData.label = addLabel(mesh, p.name);
      planetMap.set(p.name, mesh);
      clickable.push(mesh);

      if(p.name === 'Earth'){
        const moonPivot = new THREE.Object3D(); mesh.add(moonPivot);
        const moon = new THREE.Mesh(new THREE.SphereGeometry(1.1, 24, 16), new THREE.MeshPhongMaterial({ color: 0xcfd6e3 }));
        moon.position.set(10, 0, 0);
        moonPivot.add(moon);
        mesh.userData.moonPivot = moonPivot;
      }
      if(p.name === 'Saturn'){
        const inner = p.radius*1.6, outer = p.radius*3.0;
        const ringGeo = new THREE.RingGeometry(inner, outer, 128);
        const uv = ringGeo.attributes.uv; for(let i=0;i<uv.count;i++){ const u = uv.getX(i); uv.setY(i, 1-u); }
        const ringMat = new THREE.MeshBasicMaterial({ color:0xdccfaa, transparent:true, opacity:0.55, side:THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI/2; ring.rotation.z = THREE.MathUtils.degToRad(p.tilt);
        mesh.add(ring);
      }
    }

    // UI wiring
    const selectedBox = document.getElementById('selected');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetCam = document.getElementById('resetCam');
    const toggleOrbits = document.getElementById('toggleOrbits');
    const speedInput = document.getElementById('speed');
    const speedVal = document.getElementById('speedVal');
    const followSelect = document.getElementById('follow');

    let showOrbits = true, paused = false, timeScale = 10;
    function updateSpeedLabel(){ const v = Number(speedInput.value); timeScale = Math.round(Math.pow(10, v)); speedVal.textContent = `×${timeScale.toLocaleString()}`; }
    updateSpeedLabel(); speedInput.addEventListener('input', updateSpeedLabel);
    pauseBtn.addEventListener('click', ()=>{ paused = !paused; pauseBtn.classList.toggle('active', paused); pauseBtn.textContent = paused ? '▶️ Resume' : '⏸️ Pause'; });
    toggleOrbits.addEventListener('click', ()=>{ showOrbits = !showOrbits; orbitLines.visible = showOrbits; toggleOrbits.classList.toggle('active', showOrbits); toggleOrbits.textContent = showOrbits ? '🟢 Show Orbits' : '⚪ Hide Orbits'; });
    const defaultCam = { pos: camera.position.clone(), target: new THREE.Vector3(0,0,0) };
    resetCam.addEventListener('click', ()=>{ camera.position.copy(defaultCam.pos); controls.target.copy(defaultCam.target); controls.update(); followSelect.value = ''; });

    // Interaction
    function planetDetails(mesh){
      const { name, info, orbit, period } = mesh.userData;
      const distAU = (orbit/100).toFixed(2);
      return `
        <h2>${name}</h2>
        <p><strong>Type:</strong> ${info.type}</p>
        <p><strong>Fun fact:</strong> ${info.fact}</p>
        <p><strong>Approx. orbital distance (scaled):</strong> ${orbit.toLocaleString()} units (~${distAU} AU visual)</p>
        <p><strong>Orbital period (relative):</strong> ${period.toLocaleString()} Earth days</p>
        <p><strong>Moons:</strong> ${info.moons}</p>
        <p style="margin-top:8px;color:#9ab">Note: sizes & distances are scaled; orbits are circular for clarity.</p>
      `;
    }
    let highlight;
    function setHighlight(obj){
      if(highlight){ highlight.material.emissive?.setHex?.(0x000000); highlight.material.emissiveIntensity = 0; }
      highlight = obj || null;
      if(highlight){
        if (!highlight.material.emissive) highlight.material.emissive = new THREE.Color(0x000000);
        highlight.material.emissive.setHex(0x2266ff);
        highlight.material.emissiveIntensity = 0.35;
      }
    }
    function onPointer(e){
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(clickable, true);
      if(hits.length){
        const mesh = hits[0].object;
        setHighlight(mesh);
        selectedBox.innerHTML = planetDetails(mesh);
        followSelect.value = mesh.userData.name;
      }
    }
    renderer.domElement.addEventListener('pointerdown', onPointer);

    function followPlanet(){
      const name = followSelect.value;
      if(!name) return;
      const mesh = planetMap.get(name);
      if(!mesh) return;
      const worldPos = new THREE.Vector3(); mesh.getWorldPosition(worldPos);
      const offset = new THREE.Vector3(0, mesh.userData.radius*8 + 6, mesh.userData.radius*18 + 60);
      camera.position.lerp(worldPos.clone().add(offset), 0.08);
      controls.target.lerp(worldPos, 0.12);
    }

    // Animation
    const clock = new THREE.Clock();
    const TWO_PI = Math.PI*2;
    function simStep(dt){
      const simDays = dt * timeScale; // 1 real second = timeScale days
      for(const p of PLANETS){
        const mesh = planetMap.get(p.name);
        mesh.userData.pivot.rotation.y += TWO_PI * (simDays / p.period);
        mesh.rotation.y += 0.01 * (10 / Math.cbrt(p.radius));
        if(mesh.userData.moonPivot){ mesh.userData.moonPivot.rotation.y += TWO_PI * (simDays / 27.3); }
      }
    }
    function loop(){
      requestAnimationFrame(loop);
      const dt = clock.getDelta();
      if(!paused) simStep(dt);
      followPlanet();
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    loop();

    // Resize
    function onResize(){
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w/h; camera.updateProjectionMatrix();
      renderer.setSize(w,h); labelRenderer.setSize(w,h);
    }
    addEventListener('resize', onResize);

    // Preselect Earth
    setTimeout(()=>{
      const earth = planetMap.get('Earth');
      setHighlight(earth);
      document.getElementById('selected').innerHTML = planetDetails(earth);
    }, 300);
  </script>
</body>
</html>
